<!DOCTYPE html>
<html>
  <head>
    <title>{{ .Permalink | relURL }}</title>
    <link rel="canonical" href="{{ .Permalink | relURL }}"/>
    <meta name="robots" content="noindex">
    <meta http-equiv="content-type" content="text/html; charset=utf-8"/>
  </head>
  <script>
  window.onload = function() {
      let url = {{ .Permalink | relURL }};

      if (typeof WOVN !== 'undefined') {
        const wovnobj = WOVN.io.getCurrentLang();
        const wovncode = wovnobj.code;
        url = url.replace("/en/", "/" + wovncode + "/");
      }

      const query = window.location.search;
      const hash = window.location.hash;
      window.location.href = url + query + hash;
  }
  </script>
</html>
